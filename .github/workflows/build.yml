name: Build with secrets

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Create package.json if it doesn't exist
        run: |
          if [ ! -f "package.json" ]; then
            echo "Creating package.json..."
            npm init -y
            echo '{"type": "module"}' > package.temp.json && jq -s '.[0] * .[1]' package.json package.temp.json > temp.json && mv temp.json package.json
            rm -f package.temp.json
          fi

      - name: Install dependencies (Vite for building)
        run: |
          npm install --save-dev vite
          # Add other dependencies as needed
          # npm install react react-dom  # For React
          # npm install --save-dev @vitejs/plugin-react  # For React with Vite

      # Inject GitHub secrets as VITE_ environment variables
      - name: Inject secrets
        run: |
          echo "VITE_API_KEY=${{ secrets.API_KEY }}" >> .env
          echo "VITE_API_URL=${{ secrets.API_URL }}" >> .env

      - name: Build project
        run: npx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist