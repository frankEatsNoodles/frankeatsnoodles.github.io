name: Create package.json (Manual)

on:
  workflow_dispatch:  # This makes it manual-only

jobs:
  create-package-json:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Create package.json
        run: |
          if [ ! -f "package.json" ]; then
            npm init -y
            npm pkg set scripts.build="vite build"
            npm pkg set type="module"
            echo "✓ package.json created"
            echo "CREATED=true" >> $GITHUB_ENV
          else
            echo "✓ package.json already exists"
            echo "CREATED=false" >> $GITHUB_ENV
          fi

      - name: Create vite.config.js
        run: |
          if [ ! -f "vite.config.js" ] && [ ! -f "vite.config.ts" ]; then
            cat > vite.config.js << 'EOF'
import { defineConfig } from 'vite'

export default defineConfig({
  build: {
    outDir: 'dist'
  }
})
EOF
            echo "✓ vite.config.js created"
          fi

      - name: Commit and push changes
        if: env.CREATED == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json vite.config.js 2>/dev/null || true
          git commit -m "Add package.json and vite.config.js"
          git push
          echo "✓ Changes committed and pushed"

      - name: Display result
        run: |
          if [ "$CREATED" = "true" ]; then
            echo "package.json was created and committed!"
          else
            echo "package.json already existed, no changes made"
          fi
